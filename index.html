<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #1a1a1a;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
}

.phone-outer {
  --phone-w: 390px;
  --phone-h: 844px;
  --scale: min(1, calc((100vh - 40px) / 844px));
  width: var(--phone-w);
  height: var(--phone-h);
  transform: scale(var(--scale));
  transform-origin: top center;
  margin-bottom: calc((var(--phone-h) * var(--scale)) - var(--phone-h));
  position: relative;
  border-radius: 50px;
  background: #111;
  box-shadow: 0 0 0 2px #333, 0 0 0 4px #555, 0 30px 80px rgba(0,0,0,0.8);
  overflow: hidden;
}

.phone-screen {
  position: absolute;
  inset: 0;
  background: #fff;
  border-radius: 48px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.status-bar {
  height: 44px;
  background: #fff;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px 0 28px;
  flex-shrink: 0;
}
.status-time { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; color: #111; }
.status-icons { display: flex; gap: 6px; align-items: center; }

.top-nav {
  height: 44px;
  background: #fff;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  flex-shrink: 0;
  border-bottom: 1px solid #f0f0f0;
}
.nav-left { width: 32px; }
.nav-tabs { display: flex; gap: 24px; align-items: center; }
.nav-tab { font-size: 16px; color: #999; font-weight: 400; position: relative; padding-bottom: 4px; }
.nav-tab.active { color: #111; font-weight: 600; }
.nav-tab.active::after {
  content: '';
  position: absolute;
  bottom: -6px;
  left: 50%;
  transform: translateX(-50%);
  width: 20px; height: 2.5px;
  background: #ff2442;
  border-radius: 2px;
}
.nav-right { width: 32px; display: flex; justify-content: flex-end; }

.scroll-area {
  flex: 1;
  overflow-y: scroll;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 8px 6px 0;
  background: #fff;
}
.scroll-area::-webkit-scrollbar { display: none; }

.masonry { display: flex; gap: 6px; align-items: flex-start; }
.col { flex: 1; display: flex; flex-direction: column; gap: 6px; }
.col:last-child { margin-top: 24px; }

.card {
  width: 100%;
  border-radius: 10px;
  overflow: hidden;
  background: #f0f0f0;
  aspect-ratio: 3 / 4;
}
.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.bottom-tab {
  height: 83px;
  background: #fff;
  border-top: 1px solid #efefef;
  display: flex;
  align-items: flex-start;
  padding-top: 10px;
  flex-shrink: 0;
}
.tab-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  cursor: pointer;
}
.tab-item svg { width: 24px; height: 24px; }
.tab-label { font-size: 10px; color: #999; }

.tab-plus { flex: 1; display: flex; justify-content: center; }
.plus-btn {
  width: 52px; height: 34px;
  background: #ff2442;
  border-radius: 17px;
  display: flex; align-items: center; justify-content: center;
}
</style>
</head>
<body>

<div class="phone-outer">
  <div class="phone-screen">

    <div class="status-bar">
      <span class="status-time">9:41</span>
      <div class="status-icons">
        <svg width="17" height="12" viewBox="0 0 17 12"><rect x="0" y="4" width="2.5" height="8" rx="0.5" fill="#111"/><rect x="4" y="2.5" width="2.5" height="9.5" rx="0.5" fill="#111"/><rect x="8" y="1" width="2.5" height="11" rx="0.5" fill="#111"/><rect x="12" y="0" width="2.5" height="12" rx="0.5" fill="#111" opacity="0.25"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 9.5a1.5 1.5 0 100 3 1.5 1.5 0 000-3z" fill="#111"/><path d="M4.5 7C5.8 5.8 6.8 5.2 8 5.2s2.2.6 3.5 1.8" stroke="#111" stroke-width="1.5" stroke-linecap="round" fill="none"/><path d="M1.5 4.5C3.5 2.5 5.6 1.5 8 1.5s4.5 1 6.5 3" stroke="#111" stroke-width="1.5" stroke-linecap="round" fill="none"/></svg>
        <svg width="26" height="13" viewBox="0 0 26 13"><rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="#111" stroke-opacity="0.35" fill="none"/><rect x="2" y="2" width="17" height="9" rx="2" fill="#111"/><path d="M24 4.5v4a2 2 0 000-4z" fill="#111" opacity="0.4"/></svg>
      </div>
    </div>

    <div class="top-nav">
      <div class="nav-left">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <rect x="2" y="5" width="18" height="2" rx="1" fill="#333"/>
          <rect x="2" y="10" width="13" height="2" rx="1" fill="#333"/>
          <rect x="2" y="15" width="18" height="2" rx="1" fill="#333"/>
        </svg>
      </div>
      <div class="nav-tabs">
        <span class="nav-tab">关注</span>
        <span class="nav-tab active">发现</span>
        <span class="nav-tab">同城</span>
      </div>
      <div class="nav-right">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <circle cx="9.5" cy="9.5" r="6" stroke="#333" stroke-width="2"/>
          <path d="M14 14L20 20" stroke="#333" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
    </div>

    <div class="scroll-area">
      <div class="masonry">
        <div class="col" id="col0"></div>
        <div class="col" id="col1"></div>
      </div>
    </div>

    <div class="bottom-tab">
      <div class="tab-item">
        <svg viewBox="0 0 24 24" fill="none"><path d="M3 10L12 3l9 7v11a1 1 0 01-1 1H4a1 1 0 01-1-1V10z" fill="#ff2442"/></svg>
        <span class="tab-label" style="color:#ff2442;font-weight:600">首页</span>
      </div>
      <div class="tab-item">
        <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" stroke="#999" stroke-width="1.5"/><path d="M7 9h10M7 13h6" stroke="#999" stroke-width="1.5" stroke-linecap="round"/></svg>
        <span class="tab-label">市集</span>
      </div>
      <div class="tab-plus">
        <div class="plus-btn">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 3v12M3 9h12" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/></svg>
        </div>
      </div>
      <div class="tab-item">
        <svg viewBox="0 0 24 24" fill="none"><path d="M4 4h16v12H4z" stroke="#999" stroke-width="1.5" fill="none" rx="2"/><path d="M8 20h8M12 16v4" stroke="#999" stroke-width="1.5" stroke-linecap="round"/></svg>
        <span class="tab-label">消息</span>
      </div>
      <div class="tab-item">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="#999" stroke-width="1.5"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="#999" stroke-width="1.5" stroke-linecap="round"/></svg>
        <span class="tab-label">我</span>
      </div>
    </div>

  </div>
</div>

<script>
// ============================================================
// 修改这里：图片总数
const TOTAL = 24;
// ============================================================

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const order = shuffle(Array.from({length: TOTAL}, (_, i) => i + 1));
const half = Math.ceil(TOTAL / 2);
const left = order.slice(0, half);
const right = order.slice(half);

function makeCard(n) {
  const card = document.createElement('div');
  card.className = 'card';
  const img = document.createElement('img');
  img.src = `images/${n}.jpg`;
  img.alt = '';
  // fallback: try png if jpg fails
  img.onerror = function() {
    if (!this.src.endsWith('.png')) {
      this.src = `images/${n}.png`;
    }
  };
  card.appendChild(img);
  return card;
}

const c0 = document.getElementById('col0');
const c1 = document.getElementById('col1');
left.forEach(n => c0.appendChild(makeCard(n)));
right.forEach(n => c1.appendChild(makeCard(n)));
</script>
</body>
</html>
